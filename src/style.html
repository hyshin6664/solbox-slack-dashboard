<style>
    /* ============================================================ */
    /* [v0.2] 개인대시보드 Slack - 카카오톡 스타일 CSS                */
    /* ============================================================ */

    * { box-sizing: border-box; }
    body {
        margin: 0;
        padding: 0;
        font-family: 'Pretendard', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
        /* [v3.8] 배경 — 창이 넓어도 깔끔한 회색으로 변경 (노란 빈 공간 제거) */
        background: #f1f5f9;
        min-height: 100vh;
        overflow: hidden;
    }

    /* 상단 바 */
    .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 50px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        padding: 0 15px;
        gap: 10px;
        z-index: 10000;
    }
    .top-bar-title {
        font-size: 16px;
        font-weight: 800;
        color: #1e3a8a;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .top-bar-actions { margin-left: auto; display: flex; gap: 8px; }
    .action-btn {
        padding: 6px 14px;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 700;
        color: #334155;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
    }
    .action-btn:hover { background: #f1f5f9; transform: translateY(-1px); }
    .action-btn.btn-light { background: #ffffff; }

    /* 메인 컨테이너 */
    .app-container {
        position: absolute;
        top: 50px;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* 🚧 데모 모드 배너 */
    .slack-demo-banner {
        background: linear-gradient(90deg, #fbbf24, #f59e0b);
        color: #78350f;
        padding: 6px 15px;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
        border-bottom: 1px solid #f59e0b;
        flex-shrink: 0;
    }

    /* [v0.5] 메인 레이아웃 왼쪽 정렬 (사용자 요청) */
    .slack-layout {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        /* [v4.18] 창 너비 100% 채움 — 우측 빈 공간 제거 (카톡 PC처럼 딱 맞게) */
        max-width: none;
        width: 100%;
        margin: 0;
        background: #ffffff;
        flex-shrink: 1;
    }

    /* 검색 바 */
    .slack-search-wrap {
        padding: 12px 15px 8px;
        border-bottom: 1px solid #f1f5f9;
        flex-shrink: 0;
    }
    .slack-search-input {
        width: 100%;
        padding: 10px 15px 10px 38px;
        border: none;
        border-radius: 10px;
        font-size: 13px;
        background: #f1f5f9 url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>") 14px center no-repeat;
        color: #1e293b;
        outline: none;
        font-family: inherit;
        transition: all 0.15s;
    }
    .slack-search-input:focus {
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.25);
    }

    /* 탭 스위처 (개인/채널/캔버스) */
    .slack-tabs {
        display: flex;
        border-bottom: 1px solid #e2e8f0;
        background: #ffffff;
        flex-shrink: 0;
    }
    .slack-tab {
        flex: 1 1 0;
        padding: 14px 8px;
        background: transparent;
        border: none;
        font-size: 14px;
        font-weight: 700;
        color: #64748b;
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }
    .slack-tab:hover { background: #fef3c7; }
    .slack-tab.active { color: #f59e0b; }
    .slack-tab.active::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: #f59e0b;
        border-radius: 3px 3px 0 0;
    }
    .slack-tab .tab-count {
        background: #ef4444;
        color: #fff;
        font-size: 10px;
        font-weight: 800;
        padding: 1px 6px;
        border-radius: 10px;
        min-width: 18px;
        text-align: center;
    }

    /* 채팅 목록 */
    /* [v0.9] 스크롤 가능하게 — 높이 제한 + overflow */
    .slack-chat-list {
        flex: 1 1 0;
        min-height: 0;       /* flex 자식 스크롤 핵심! */
        overflow-y: auto;
        background: #ffffff;
    }
    .slack-chat-item {
        padding: 12px 16px;
        display: flex;
        gap: 12px;
        cursor: pointer;
        border-bottom: 1px solid #f8fafc;
        transition: background 0.12s;
        align-items: center;
        width: 100%;
        box-sizing: border-box;
    }
    .slack-chat-item { position: relative; }
    .slack-chat-item:hover { background: #fef9e7; transform: translateX(1px); }
    .slack-chat-item.unread {
        background: #fffbeb;
        box-shadow: inset 3px 0 0 #f59e0b; /* 좌측 노란 스트립 */
    }
    .slack-chat-item.unread:hover { background: #fef3c7; }
    /* 새 메시지 도착 pulse — 300ms */
    @keyframes slackItemPulse {
        0% { background-color: #fef3c7; }
        50% { background-color: #fde68a; }
        100% { background-color: #fffbeb; }
    }
    .slack-chat-item.unread.just-arrived { animation: slackItemPulse 600ms ease-out; }
    /* 메시지 버블 slide-in */
    @keyframes msgSlideIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .msg-row.msg-new, .chat-msg.msg-new { animation: msgSlideIn 280ms cubic-bezier(0.25, 1, 0.5, 1); }

    .slack-chat-avatar {
        flex: 0 0 46px;
        width: 46px;
        height: 46px;
        border-radius: 16px;
        background: #fbbf24;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 800;
        text-transform: uppercase;
        position: relative;
    }
    .slack-chat-avatar.channel-icon { background: #64748b; font-size: 20px; }
    .slack-chat-avatar.canvas-icon { background: #8b5cf6; font-size: 20px; }
    /* [v0.3] 그룹 아바타 (2~3개 겹침) */
    .slack-chat-avatar.group-avatar,
    .slack-popup-header-avatar.group-avatar {
        background: transparent !important;
        position: relative;
        overflow: visible;
    }
    .group-avatar-mini {
        position: absolute;
        border-radius: 12px;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        border: 2px solid #ffffff;
        box-sizing: border-box;
    }
    /* 목록 아바타 (46px 기준) */
    .slack-chat-avatar.group-avatar .group-avatar-mini { width: 28px; height: 28px; }
    .slack-chat-avatar.group-avatar .group-avatar-mini-0 { top: 0;   left: 0; }
    .slack-chat-avatar.group-avatar .group-avatar-mini-1 { top: 0;   right: 0; }
    .slack-chat-avatar.group-avatar .group-avatar-mini-2 { bottom: 0; left: 50%; transform: translateX(-50%); }
    /* 팝업 헤더 아바타 (32px 기준) */
    .slack-popup-header-avatar.group-avatar .group-avatar-mini { width: 20px; height: 20px; font-size: 9px; }
    .slack-popup-header-avatar.group-avatar .group-avatar-mini-0 { top: 0;   left: 0; }
    .slack-popup-header-avatar.group-avatar .group-avatar-mini-1 { top: 0;   right: 0; }
    .slack-popup-header-avatar.group-avatar .group-avatar-mini-2 { bottom: 0; left: 50%; transform: translateX(-50%); }
    .slack-chat-avatar .online-dot {
        position: absolute;
        right: -2px;
        bottom: -2px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #22c55e;
        border: 2px solid #ffffff;
    }

    .slack-chat-info { flex: 1 1 auto; min-width: 0; }
    .slack-chat-name-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }
    .slack-chat-name {
        font-size: 14px;
        font-weight: 700;
        color: #1e293b;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .slack-chat-time {
        font-size: 11px;
        color: #94a3b8;
        flex-shrink: 0;
        margin-left: 8px;
    }
    .slack-chat-preview-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
    }
    .slack-chat-preview {
        font-size: 12px;
        color: #64748b;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1 1 auto;
    }
    .slack-chat-unread {
        background: #ef4444;
        color: #ffffff;
        font-size: 10px;
        font-weight: 800;
        padding: 2px 7px;
        border-radius: 10px;
        min-width: 18px;
        text-align: center;
        flex-shrink: 0;
    }

    /* [v0.9] 스켈레톤 로딩 (빈 화면 금지!) */
    .slack-skeleton-item {
        padding: 12px 15px;
        display: flex;
        gap: 12px;
        align-items: center;
        animation: skeletonPulse 1.4s ease-in-out infinite;
    }
    @keyframes skeletonPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
    }
    .skeleton-avatar {
        width: 46px;
        height: 46px;
        border-radius: 16px;
        background: #e2e8f0;
        flex-shrink: 0;
    }
    .skeleton-lines { flex: 1; }
    .skeleton-line {
        height: 12px;
        background: #e2e8f0;
        border-radius: 6px;
        margin-bottom: 6px;
    }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.long { width: 90%; }
    .skeleton-line.tiny { width: 40%; height: 10px; }

    /* [v0.9] 로딩 이모지 애니메이션 */
    .slack-loading-emoji {
        text-align: center;
        padding: 30px;
        font-size: 36px;
        animation: emojiDance 1.5s ease-in-out infinite;
    }
    @keyframes emojiDance {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-10px) rotate(-10deg); }
        75% { transform: translateY(-10px) rotate(10deg); }
    }

    /* [v1.0] 팝업 전체 크기 모드 */
    .slack-popup.maximized {
        width: 80vw !important;
        height: 88vh !important;
        left: 10vw !important;
        top: 56px !important;
        border-radius: 10px;
    }

    /* [v1.0] 이미지 붙여넣기 프리뷰 */
    .slack-paste-preview {
        padding: 8px 12px;
        background: #fef3c7;
        border-top: 2px solid #fbbf24;
        display: none;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }
    .slack-paste-preview.visible { display: flex; }
    .slack-paste-preview img {
        max-width: 120px;
        max-height: 80px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
    }
    .slack-paste-preview-info {
        flex: 1;
        font-size: 12px;
        color: #78350f;
    }
    .slack-paste-preview button {
        padding: 4px 10px;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
    }
    .slack-paste-send { background: #3b82f6; color: #fff; }
    .slack-paste-cancel { background: #e2e8f0; color: #475569; }

    .slack-chat-empty {
        text-align: center;
        padding: 60px 20px;
        color: #94a3b8;
        font-size: 14px;
    }
    .slack-chat-empty-icon {
        font-size: 48px;
        margin-bottom: 10px;
        opacity: 0.4;
    }

    /* ============================================================ */
    /* 카카오톡 스타일 채팅 팝업                                     */
    /* ============================================================ */
    .set-menu-item {
        display: block;
        width: 100%;
        padding: 8px 12px;
        background: transparent;
        border: none;
        text-align: left;
        font-size: 13px;
        color: #1e293b;
        cursor: pointer;
        border-radius: 6px;
    }
    .set-menu-item:hover { background: #f1f5f9; }

    /* [v5.1] 시스템 다크모드 자동 감지 — 메인 대시보드만 (채팅창은 카톡 하늘색 유지) */
    @media (prefers-color-scheme: dark) {
        body:not(.chat-window-mode) { background: #0f172a !important; color: #e2e8f0; }
        body:not(.chat-window-mode) .top-bar { background: #1e293b !important; border-color: #334155 !important; }
        body:not(.chat-window-mode) .slack-layout { background: #1e293b !important; }
        body:not(.chat-window-mode) .slack-search-input { background-color: #334155 !important; color: #f1f5f9; }
        body:not(.chat-window-mode) .slack-tabs { background: #1e293b !important; border-bottom-color: #334155 !important; }
        body:not(.chat-window-mode) .slack-tab { color: #94a3b8; }
        body:not(.chat-window-mode) .slack-tab.active { color: #fbbf24; }
        body:not(.chat-window-mode) .slack-chat-list { background: #1e293b !important; }
        body:not(.chat-window-mode) .slack-chat-item { border-bottom-color: #334155; }
        body:not(.chat-window-mode) .slack-chat-item:hover { background: #334155 !important; }
        body:not(.chat-window-mode) .slack-chat-item.unread { background: #422006 !important; }
        body:not(.chat-window-mode) .slack-chat-name { color: #f1f5f9; }
        body:not(.chat-window-mode) .slack-chat-preview { color: #94a3b8 !important; }
        body:not(.chat-window-mode) #settingsDropdown { background: #1e293b !important; border-color: #334155 !important; }
        body:not(.chat-window-mode) .set-menu-item { color: #e2e8f0; }
        body:not(.chat-window-mode) .set-menu-item:hover { background: #334155 !important; }
    }

    .slack-popup-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 500000;
    }
    .slack-popup {
        position: absolute;
        width: 360px;
        height: 520px;
        background: #b2c7d9; /* 카톡 배경 하늘색 */
        border-radius: 14px;
        box-shadow: 0 10px 40px rgba(15, 23, 42, 0.35);
        display: flex;
        flex-direction: column;
        pointer-events: auto;
        overflow: hidden;
        animation: slackPopupIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes slackPopupIn {
        from { opacity: 0; transform: scale(0.85) translateY(20px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .slack-popup.minimized { display: none; }

    .slack-popup-header {
        background: #b2c7d9;
        color: #1e293b;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: move;
        user-select: none;
        flex-shrink: 0;
    }
    .slack-popup-header-avatar {
        width: 32px;
        height: 32px;
        border-radius: 12px;
        background: #fbbf24;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
    }
    .slack-popup-header-avatar.channel-icon { background: #64748b; }
    .slack-popup-header-avatar.canvas-icon { background: #8b5cf6; }
    .slack-popup-header-title {
        flex: 1 1 auto;
        font-size: 14px;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .slack-popup-header-btn {
        width: 28px;
        height: 28px;
        background: transparent;
        border: none;
        color: #1e293b;
        font-size: 14px;
        cursor: pointer;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        font-family: inherit;
    }
    .slack-popup-header-btn:hover { background: rgba(0, 0, 0, 0.08); }

    .slack-popup-body {
        flex-grow: 1;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #b2c7d9;
    }

    /* 말풍선 - 타인 */
    .msg-bubble-row { display: flex; gap: 8px; align-items: flex-start; }
    .msg-bubble-row .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 12px;
        background: #fbbf24;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 800;
        flex-shrink: 0;
        text-transform: uppercase;
    }
    .msg-bubble-col { display: flex; flex-direction: column; max-width: 75%; }
    .msg-sender-name {
        font-size: 11px;
        color: #334155;
        margin-bottom: 3px;
        font-weight: 700;
    }
    .msg-bubble-wrap { display: flex; align-items: flex-end; gap: 5px; }
    .msg-bubble {
        background: #ffffff;
        color: #1e293b;
        padding: 8px 12px;
        border-radius: 14px;
        font-size: 13px;
        word-break: break-word;
        white-space: pre-wrap;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
    .msg-time {
        font-size: 10px;
        color: #475569;
        margin-bottom: 2px;
        white-space: nowrap;
    }

    /* 말풍선 - 내 메시지 */
    .msg-bubble-row.mine { flex-direction: row-reverse; }
    .msg-bubble-row.mine .msg-avatar { display: none; }
    .msg-bubble-row.mine .msg-bubble-col { align-items: flex-end; }
    .msg-bubble-row.mine .msg-bubble {
        background: #fef033; /* 카톡 내 메시지 노란색 */
        color: #1e293b;
    }
    .msg-bubble-row.mine .msg-bubble-wrap { flex-direction: row-reverse; }

    /* [v0.4] 답장(reply) 관련 */
    .msg-bubble-row { position: relative; }
    .msg-reply-btn {
        position: absolute;
        top: -4px;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 700;
        color: #475569;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.15s;
        font-family: inherit;
        z-index: 10;
    }
    .msg-bubble-row:hover .msg-reply-btn { opacity: 1; }
    .msg-bubble-row:not(.mine) .msg-reply-btn { right: -8px; }
    .msg-bubble-row.mine .msg-reply-btn { left: -8px; }

    /* 말풍선 안의 인용 박스 */
    .msg-quote-box {
        border-left: 3px solid #fbbf24;
        background: rgba(255, 255, 255, 0.6);
        padding: 6px 10px;
        margin-bottom: 5px;
        border-radius: 6px;
        cursor: pointer;
        max-width: 100%;
    }
    .msg-quote-box:hover { background: rgba(255, 255, 255, 0.85); }
    .msg-quote-from {
        font-size: 10px;
        font-weight: 800;
        color: #92400e;
        margin-bottom: 2px;
    }
    .msg-quote-text {
        font-size: 11px;
        color: #475569;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 200px;
    }

    /* 하이라이트 애니메이션 (인용 클릭 시 원본으로 스크롤) */
    @keyframes msgHighlight {
        0%, 100% { box-shadow: none; }
        50% { box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.6); }
    }
    .msg-bubble.highlighted { animation: msgHighlight 2s ease; }

    /* 입력창 위 답장 미리보기 */
    .slack-reply-preview {
        background: #fef3c7;
        border-top: 2px solid #fbbf24;
        padding: 8px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
    }
    .slack-reply-preview-info { flex: 1 1 auto; min-width: 0; }
    .slack-reply-preview-from {
        font-size: 10px;
        font-weight: 800;
        color: #92400e;
    }
    .slack-reply-preview-text {
        font-size: 12px;
        color: #475569;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .slack-reply-cancel {
        background: transparent;
        border: none;
        color: #78350f;
