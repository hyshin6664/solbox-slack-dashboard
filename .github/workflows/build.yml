name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (mac universal)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust (win)
        if: matrix.platform == 'windows-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Pre-clean existing release (Windows runs first, deletes prior release)
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v1.0.0 --repo ${{ github.repository }} --yes --cleanup-tag || echo "No prior release"
        shell: bash

      - name: Wait for cleanup (Mac runs after Win cleanup)
        if: matrix.platform == 'macos-latest'
        run: sleep 45

      - name: Build & Release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Slack 대시보드 v__VERSION__'
          releaseBody: |
            ## 최신 자동 빌드
            - 🪟 Windows: `setup.exe` 다운로드 → 더블클릭 → 자동 설치
            - 🍎 macOS: `setup.dmg` 다운로드 → 드래그로 설치

            솔박스 직원 전용. 첫 실행 시 본인 Google + Slack 로그인 필요.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
